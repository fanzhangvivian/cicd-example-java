pipeline:
  name: JAVA-TEST
  description: compile demo

stages:
  - build

compile:
  stage: build
  image: eclipse-temurin:17
  script:
    - pwd
    - find src/main/java -name '*.java'
    - mkdir -p out/main
    - javac -d out/main src/main/java/com/example/App.java src/main/java/com/example/Calculator.java