pipeline:
  name: java-success
  description: A successful Java pipeline

stages:
  - build
  - test

compile:
  stage: build
  image: eclipse-temurin:21
  script:
    - rm -rf out/main
    - mkdir -p out/main
    - find src/main/java -name '*.java' -print0 | xargs -0 javac -d out/main

run-tests:
  stage: test
  image: eclipse-temurin:21
  script:
    - rm -rf out/main out/test
    - mkdir -p out/main out/test
    - find src/main/java -name '*.java' -print0 | xargs -0 javac -d out/main
    - javac -cp out/main -d out/test src/test/java/com/example/CalculatorTest.java
    - java -cp out/main:out/test com.example.CalculatorTest