# Goal: pipeline fails during compilation.
pipeline:
  name: java-compile-failure

stages:
  - prepare
  - build

enable-broken-source:
  stage: prepare
  image: eclipse-temurin:17
  script: cp src/main/java/com/example/BrokenSource.java.template src/main/java/com/example/BrokenSource.java


compile:
  stage: build
  image: eclipse-temurin:17
  script: mvn -B clean compile
