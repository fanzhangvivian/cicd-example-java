pipeline:
  name: pending-demo

stages:
  - build

lint:
  stage: build
  image: alpine:3.19
  failures: true
  script:
    - echo "lint running"
    - sleep 15
    - exit 1

compile:
  stage: build
  image: alpine:3.19
  failures: false
  needs: [lint]
  script:
    - echo "compile running"
    - sleep 10
